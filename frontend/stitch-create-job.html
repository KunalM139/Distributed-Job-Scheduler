<!-- Main Content -->

<!-- Header -->

</div>

<h1 class="font-headline-md text-headline-md text-on-surface">Create New Job</h1>
<p class="text-on-surface-variant mt-1 text-body-base">Configure and submit a job for distributed execution.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-container-margin" id="createJobForm">
<!-- Job Details -->
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-container-margin">
<h2 class="font-title-sm text-title-sm text-on-surface mb-stack-md">Job Details</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md mb-stack-md">
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-outline">Project</label>
<select class="bg-surface-container border border-outline-variant rounded py-2 px-3 text-on-surface text-sm focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none appearance-none cursor-pointer">
<option>Data Processing Team</option>
<option>Marketing Sync</option>
</select>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-outline">Target Queue</label>
<select class="bg-surface-container border border-outline-variant rounded py-2 px-3 text-on-surface text-sm focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none appearance-none cursor-pointer">
<option>high-priority</option>
<option>default</option>
<option>background</option>
</select>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-outline">Job Name / Type *</label>
<input class="bg-surface-container border border-outline-variant rounded py-2 px-3 text-on-surface font-code-sm text-sm focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" placeholder="e.g., data-sync-pipeline" required="" type="text"/>
</div>
</div>
<!-- Execution Type -->
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-container-margin">
<h2 class="font-title-sm text-title-sm text-on-surface mb-stack-md">Execution Type</h2>
<div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-stack-md">
<label class="relative cursor-pointer group">
<input class="sr-only peer" name="jobType" type="radio" value="immediate"/>
<div class="h-full border border-outline-variant rounded-lg p-3 flex flex-col items-center text-center gap-2 peer-checked:border-primary-container peer-checked:bg-primary-container/10 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-outline group-hover:text-on-surface peer-checked:text-primary-container">bolt</span>
<span class="font-body-base text-sm text-on-surface">Immediate</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="sr-only peer" name="jobType" type="radio" value="delayed"/>
<div class="h-full border border-outline-variant rounded-lg p-3 flex flex-col items-center text-center gap-2 peer-checked:border-primary-container peer-checked:bg-primary-container/10 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-outline group-hover:text-on-surface peer-checked:text-primary-container">hourglass_empty</span>
<span class="font-body-base text-sm text-on-surface">Delayed</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="sr-only peer" name="jobType" type="radio" value="scheduled"/>
<div class="h-full border border-outline-variant rounded-lg p-3 flex flex-col items-center text-center gap-2 peer-checked:border-primary-container peer-checked:bg-primary-container/10 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-outline group-hover:text-on-surface peer-checked:text-primary-container">event</span>
<span class="font-body-base text-sm text-on-surface">Scheduled</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input checked="" class="sr-only peer" name="jobType" type="radio" value="recurring"/>
<div class="h-full border border-outline-variant rounded-lg p-3 flex flex-col items-center text-center gap-2 peer-checked:border-primary-container peer-checked:bg-primary-container/10 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-outline group-hover:text-on-surface peer-checked:text-primary-container">update</span>
<span class="font-body-base text-sm text-on-surface">Recurring</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="sr-only peer" name="jobType" type="radio" value="batch"/>
<div class="h-full border border-outline-variant rounded-lg p-3 flex flex-col items-center text-center gap-2 peer-checked:border-primary-container peer-checked:bg-primary-container/10 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-outline group-hover:text-on-surface peer-checked:text-primary-container">library_books</span>
<span class="font-body-base text-sm text-on-surface">Batch</span>
</div>
</label>
</div>
<div class="flex flex-col gap-1.5 pt-2 border-t border-outline-variant/30">
<label class="font-label-caps text-outline mt-2">Cron Expression</label>
<input class="bg-surface-container border border-outline-variant rounded py-2 px-3 text-on-surface font-code-sm text-sm focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" type="text" value="0 12 * * ?"/>
</div>
</div>
<!-- Payload Editor -->
<div class="bg-surface-container-low border border-outline-variant rounded-lg flex flex-col h-[320px]">
<div class="p-4 border-b border-outline-variant flex justify-between items-center bg-surface-container-lowest/50 rounded-t-lg">
<h2 class="font-title-sm text-title-sm text-on-surface">Payload Configuration</h2>
<span class="text-[10px] text-outline font-label-caps tracking-widest uppercase border border-outline-variant rounded px-2 py-0.5">JSON</span>
</div>
<div class="flex-1 flex bg-surface-container-lowest rounded-b-lg overflow-hidden relative group">
<div class="w-10 border-r border-outline-variant/30 flex flex-col items-end py-4 pr-2 font-code-sm text-xs text-outline select-none opacity-50">
<span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
</div>
<textarea class="flex-1 bg-transparent border-none text-on-surface font-code-sm text-[13px] p-4 focus:ring-0 resize-none outline-none custom-scrollbar leading-relaxed" spellcheck="false">{
  "action": "sync_customer_data",
  "batch_size": 1000,
  "parameters": {
    "source_db": "legacy_sql_01",
    "target_index": "es_customers_v3"
  },
  "notify_on_completion": true
}</textarea>
</div>
</div>
</form>
</div>

<div class="sticky bottom-0 w-full bg-surface border-t border-outline-variant p-4 z-20 flex justify-end items-center px-container-margin gap-3">
<button class="px-4 py-2 text-sm font-title-sm text-on-surface border border-outline-variant rounded hover:bg-surface-container-high transition-colors" type="button">
                Cancel
            </button>
<button class="px-6 py-2 text-sm font-title-sm bg-primary-container text-on-primary-container rounded hover:opacity-90 transition-opacity flex items-center gap-2" form="createJobForm" type="submit">
<span class="material-symbols-outlined text-[18px]">add</span>
                Create Job
            </button>
</div>
